site_name: CalendarApp Docs
site_description: Public documentation for CalendarApp source contribution workflows for humans and AI agents.
site_url: https://martinisaksen.github.io/calendarapp-docs/
repo_url: https://github.com/calendarapp/calendarapp-docs
repo_name: calendarapp/calendarapp-docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - def_list

nav:
  - Home: index.md
  - Start Here:
    - Scope And Audience: index.md
    - Choose A Source Type: source-schemas/choose-source-type.md
    - Submission API And Validation: source-schemas/submission-api-and-validation.md
    - Source Schema JSON Schema Files: source-schemas/json-schema-files.md
    - Human Workflow (Source Contributor): source-schemas/choose-source-type.md
    - AI Workflow (Autonomous Agent): ai/source-onboarding/runbook.md
  - Human Source Contribution:
    - Shared Workflow:
      - Choose A Source Type: source-schemas/choose-source-type.md
      - Submission API And Validation: source-schemas/submission-api-and-validation.md
      - Source Schema JSON Schema Files: source-schemas/json-schema-files.md
      - Pipeline V3 Overview (Draft): source-schemas/v3/pipeline-overview.md
      - Pipeline V3 Examples (Draft): source-schemas/v3/pipeline-examples.md
      - Pipeline V3 JSON Schema (Draft): source-schemas/v3/source-schema-v3.schema.json
      - Validation Checklist: source-schemas/html-lite/validation-checklist.md
      - Troubleshooting: source-schemas/html-lite/troubleshooting.md
    - Ics Reference:
      - Overview: source-schemas/ics.md
      - Ics JSON Schema: source-schemas/ics.schema.json
    - Rss Reference:
      - Overview: source-schemas/rss.md
      - Rss JSON Schema: source-schemas/rss.schema.json
    - JsonApi Reference:
      - Overview: source-schemas/json-api.md
      - JsonApi V2 JSON Schema (Legacy): source-schemas/json-api-v2-json-schema.md
    - HtmlLite Reference:
      - Overview: source-schemas/html-lite/overview.md
      - HtmlLite JSON Schema: source-schemas/html-lite.schema.json
      - API Workflow: source-schemas/html-lite/api-workflow.md
      - Schema Basics: source-schemas/html-lite/schema-basics.md
      - Selectors: source-schemas/html-lite/selectors.md
      - Event Identity: source-schemas/html-lite/event-identity.md
      - Time Handling: source-schemas/html-lite/time-handling.md
      - Pagination: source-schemas/html-lite/pagination.md
      - Detail Pages: source-schemas/html-lite/detail-pages.md
      - Validation Checklist: source-schemas/html-lite/validation-checklist.md
      - Troubleshooting: source-schemas/html-lite/troubleshooting.md
  - AI Autonomous Onboarding:
    - Autonomous Runbook: ai/source-onboarding/runbook.md
    - ChatGPT Prompt (No HTTP Tools): ai/source-onboarding/prompt-template.md
    - Choose A Source Type: source-schemas/choose-source-type.md
    - Submission API And Validation: source-schemas/submission-api-and-validation.md
    - HtmlLite Overview: source-schemas/html-lite/overview.md
